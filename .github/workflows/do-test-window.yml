# .github/workflows/do-test-window.yml
# Wake the DO dev app on push, then auto-archive after ~1h idle.
# Put this file in istarserver_dev and/or istarapp_dev.
# Behavior:
#   - push to main/master -> restore (un-archive) app + deploy latest
#   - stays live ~1 hour, then archives itself (billing stops)
#   - a new push cancels the running job and resets the 1h timer
#   - timer runs on GitHub's runner (your computer need not stay on)
#   - no secrets in the repo (spec is fetched from DO at runtime)

name: DO dev test window

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      keep_alive_seconds:
        description: "Seconds to stay live before archiving"
        default: "3600"

concurrency:
  group: do-app-king-prawn
  cancel-in-progress: true

env:
  APP_ID: 0346a1c0-7732-4e34-ac50-e6b365ad95b7

jobs:
  wake-then-archive:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Restore (un-archive) and deploy latest
        run: |
          doctl apps spec get "$APP_ID" | awk '/^maintenance:/{f=1;next} f&&/^[[:space:]]/{next} {f=0;print}' > live.yaml
          doctl apps update "$APP_ID" --spec live.yaml --wait
          echo "App is LIVE."

      - name: Stay live, then archive after idle window
        run: |
          SECS="${{ github.event.inputs.keep_alive_seconds || '3600' }}"
          echo "Staying live for ${SECS}s; a new push resets this."
          sleep "${SECS}"
          doctl apps spec get "$APP_ID" | awk '/^maintenance:/{f=1;next} f&&/^[[:space:]]/{next} {f=0;print}' > live.yaml
          echo "" >> live.yaml
          echo "maintenance:" >> live.yaml
          echo "  archive: true" >> live.yaml
          doctl apps update "$APP_ID" --spec live.yaml --wait
          echo "Archived. Billing stopped."
